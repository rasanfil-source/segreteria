<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #2f4f4f; stroke-width: 1.5; rx: 8; ry: 8; }
      .diamond { fill: #ffffff; stroke: #2f4f4f; stroke-width: 1.5; }
      .title { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #1f2d3d; }
      .label { font: 12px 'Segoe UI', Arial, sans-serif; fill: #1f2d3d; }
      .arrow { stroke: #394b59; stroke-width: 1.6; fill: none; }
      .edge-label { font: 11px 'Segoe UI', Arial, sans-serif; fill: #394b59; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#394b59" />
    </marker>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="title">Decision Tree - Troubleshooting Rapido</text>

  <!-- Top -->
  <rect x="450" y="70" width="300" height="50" class="box"/>
  <text x="600" y="100" text-anchor="middle" class="label">Problema rilevato</text>

  <polygon points="600,150 690,195 600,240 510,195" class="diamond"/>
  <text x="600" y="192" text-anchor="middle" class="label">Sistema risponde?</text>

  <!-- Left branch: NO -->
  <polygon points="260,250 340,295 260,340 180,295" class="diamond"/>
  <text x="260" y="292" text-anchor="middle" class="label">Trigger attivo?</text>

  <rect x="60" y="360" width="200" height="50" class="box"/>
  <text x="160" y="390" text-anchor="middle" class="label">setupTrigger()</text>

  <rect x="60" y="430" width="200" height="50" class="box"/>
  <text x="160" y="460" text-anchor="middle" class="label">Controlla esecuzioni</text>

  <polygon points="260,500 340,545 260,590 180,545" class="diamond"/>
  <text x="260" y="542" text-anchor="middle" class="label">Errore API Key?</text>

  <rect x="60" y="610" width="200" height="50" class="box"/>
  <text x="160" y="640" text-anchor="middle" class="label">Rigenera chiave API</text>

  <rect x="320" y="610" width="200" height="50" class="box"/>
  <text x="420" y="640" text-anchor="middle" class="label">Controlla quota API</text>

  <!-- Right branch: YES but bad -->
  <polygon points="940,250 1020,295 940,340 860,295" class="diamond"/>
  <text x="940" y="292" text-anchor="middle" class="label">Molte in Verifica?</text>

  <rect x="820" y="360" width="240" height="50" class="box"/>
  <text x="940" y="390" text-anchor="middle" class="label">Abbassa VALIDATION_MIN_SCORE</text>

  <rect x="820" y="430" width="240" height="50" class="box"/>
  <text x="940" y="460" text-anchor="middle" class="label">Review email singole</text>

  <!-- Arrows -->
  <line x1="600" y1="120" x2="600" y2="150" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="510" y1="195" x2="340" y2="295" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="410" y="230" text-anchor="middle" class="edge-label">No</text>

  <line x1="690" y1="195" x2="860" y2="295" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="800" y="230" text-anchor="middle" class="edge-label">Si ma male</text>

  <!-- Left branch arrows -->
  <line x1="260" y1="340" x2="160" y2="360" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="200" y="340" text-anchor="middle" class="edge-label">No</text>

  <line x1="260" y1="340" x2="160" y2="430" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="235" y="400" text-anchor="middle" class="edge-label">Si</text>

  <line x1="160" y1="480" x2="260" y2="500" class="arrow" marker-end="url(#arrowhead)"/>

  <line x1="180" y1="545" x2="160" y2="610" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="160" y="585" text-anchor="middle" class="edge-label">Si</text>

  <line x1="340" y1="545" x2="320" y2="610" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="330" y="585" text-anchor="middle" class="edge-label">No</text>

  <!-- Right branch arrows -->
  <line x1="940" y1="340" x2="940" y2="360" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="960" y="352" text-anchor="start" class="edge-label">Si</text>

  <line x1="940" y1="340" x2="940" y2="430" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="960" y="410" text-anchor="start" class="edge-label">No</text>
</svg>
