<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .group { fill: #f5f7fb; stroke: #8aa0b2; stroke-width: 1.5; rx: 12; ry: 12; }
      .box { fill: #ffffff; stroke: #2f4f4f; stroke-width: 1.5; rx: 8; ry: 8; }
      .title { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #1f2d3d; }
      .label { font: 12px 'Segoe UI', Arial, sans-serif; fill: #1f2d3d; }
      .arrow { stroke: #394b59; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#394b59" />
    </marker>
  </defs>

  <!-- Groups -->
  <rect x="20" y="40" width="260" height="640" class="group"/>
  <text x="150" y="70" text-anchor="middle" class="title">Google Workspace</text>

  <rect x="320" y="40" width="560" height="640" class="group"/>
  <text x="600" y="70" text-anchor="middle" class="title">Google Apps Script Runtime</text>

  <rect x="900" y="40" width="280" height="640" class="group"/>
  <text x="1040" y="70" text-anchor="middle" class="title">External APIs</text>

  <!-- Workspace boxes -->
  <rect x="50" y="120" width="200" height="60" class="box"/>
  <text x="150" y="155" text-anchor="middle" class="label">Gmail (API)</text>

  <rect x="50" y="220" width="200" height="60" class="box"/>
  <text x="150" y="255" text-anchor="middle" class="label">Google Sheets</text>

  <!-- Runtime boxes -->
  <rect x="350" y="90" width="220" height="50" class="box"/>
  <text x="460" y="120" text-anchor="middle" class="label">Main (Orchestrator)</text>

  <rect x="350" y="160" width="220" height="60" class="box"/>
  <text x="460" y="195" text-anchor="middle" class="label">EmailProcessor</text>

  <rect x="350" y="240" width="220" height="50" class="box"/>
  <text x="460" y="270" text-anchor="middle" class="label">Classifier</text>

  <rect x="350" y="305" width="220" height="50" class="box"/>
  <text x="460" y="335" text-anchor="middle" class="label">RequestClassifier</text>

  <rect x="350" y="370" width="220" height="50" class="box"/>
  <text x="460" y="400" text-anchor="middle" class="label">TerritoryValidator</text>

  <rect x="350" y="435" width="220" height="50" class="box"/>
  <text x="460" y="465" text-anchor="middle" class="label">PromptEngine</text>

  <rect x="350" y="500" width="220" height="50" class="box"/>
  <text x="460" y="530" text-anchor="middle" class="label">GeminiService</text>

  <rect x="350" y="565" width="220" height="50" class="box"/>
  <text x="460" y="595" text-anchor="middle" class="label">ResponseValidator</text>

  <rect x="600" y="500" width="220" height="50" class="box"/>
  <text x="710" y="530" text-anchor="middle" class="label">RateLimiter</text>

  <rect x="600" y="565" width="220" height="50" class="box"/>
  <text x="710" y="595" text-anchor="middle" class="label">MemoryService</text>

  <!-- External API -->
  <rect x="930" y="150" width="200" height="70" class="box"/>
  <text x="1030" y="185" text-anchor="middle" class="label">Gemini API</text>
  <text x="1030" y="205" text-anchor="middle" class="label">2.5 Flash / Lite</text>

  <!-- Arrows -->
  <line x1="250" y1="150" x2="350" y2="115" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="140" x2="460" y2="160" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="220" x2="460" y2="240" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="290" x2="460" y2="305" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="355" x2="460" y2="370" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="420" x2="460" y2="435" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="485" x2="460" y2="500" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="550" x2="460" y2="565" class="arrow" marker-end="url(#arrowhead)"/>

  <line x1="570" y1="525" x2="600" y2="525" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="525" x2="930" y2="185" class="arrow" marker-end="url(#arrowhead)"/>

  <line x1="570" y1="590" x2="600" y2="590" class="arrow" marker-end="url(#arrowhead)"/>
  <polyline points="820,590 820,640 150,640 150,280" class="arrow" marker-end="url(#arrowhead)"/>

  <polyline points="350,590 250,590 250,150" class="arrow" marker-end="url(#arrowhead)"/>
</svg>
